schema_version: 1

context:
  version: 2.9.2

package:
  name: pdal
  version: ${{ version }}

source:
  url: https://github.com/PDAL/PDAL/releases/download/${{ version }}/PDAL-${{ version }}-src.tar.bz2
  sha256: a74bbc7f4e4f709ed589dbbb851926a63c391c974e3fc40a4c3ff34f7923021b

build:
  number: 1
  noarch: generic

requirements:
  build:
  host:
  run:
    - libpdal 2.9.2.*
    - python-pdal
  run_exports:
    - ${{ pin_subpackage('pdal', upper_bound='x.x') }}

tests:
  - script:
      - pdal --version
      - pdal --drivers --debug

about:
  license: BSD-3-Clause
  license_file: LICENSE.txt
  summary: Point Data Abstraction Library (PDAL) meta package
  description: Point cloud data processing library meta package
  homepage: https://www.pdal.io
  repository: https://github.com/pdal/pdal
  documentation: https://pdal.io

extra:
  recipe-maintainers:
    - chambbj
    - hobu
